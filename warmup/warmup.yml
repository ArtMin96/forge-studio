# Claude Code Budget Window Warmup
# ─────────────────────────────────
# Sends a minimal Haiku message on a schedule to anchor your 5-hour
# token budget window to a predictable time.
#
# Setup:
#   1. Copy this file to .github/workflows/warmup.yml in any repo
#   2. Run: claude setup-token
#   3. Add the token as a GitHub secret named CLAUDE_CODE_OAUTH_TOKEN
#   4. Adjust the cron schedule below for your timezone (cron is UTC)
#
# See docs/warmup.md for timezone conversion tables and schedule optimization.

name: Claude Code Warmup

on:
  # ── CHANGE THIS ──────────────────────────────────────────────
  # Default: 08:15 Armenia (UTC+4) on weekdays = 04:15 UTC
  # Anchors window 1 to 08:00–13:00 so it expires at lunch start.
  # Use https://crontab.guru to build your expression
  schedule:
    - cron: "15 4 * * 1-5"
  # ─────────────────────────────────────────────────────────────

  workflow_dispatch: # Manual trigger for testing

jobs:
  warmup:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Ping Claude
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          mkdir -p ~/.claude
          touch ~/.claude/.onboarding-complete
          claude -p "hi" \
            --model haiku \
            --no-persist-session
